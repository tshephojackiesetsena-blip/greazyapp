<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard - Greazy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.1) 0%, rgba(255, 140, 66, 0.1) 100%),
                        url('https://images.unsplash.com/photo-1555939594-58d7cb561481?auto=format&fit=crop&w=2000&q=80') center/cover;
            background-attachment: fixed;
            color: #333;
            min-height: 100vh;
        }

        /* Header */
        header {
            background: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #FF6B35 0%, #FFA500 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logout-btn {
            background: linear-gradient(135deg, #FF6B35 0%, #FFA500 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 53, 0.3);
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .dashboard-header {
            margin-bottom: 40px;
        }

        .dashboard-header h1 {
            font-size: 36px;
            margin-bottom: 10px;
            color: #333;
        }

        .dashboard-header p {
            color: #666;
            font-size: 16px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #FF6B35;
        }

        .stat-label {
            color: #999;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #FF6B35;
        }

        /* Orders Table */
        .orders-section {
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .orders-header {
            padding: 25px;
            background: linear-gradient(135deg, #FF6B35 0%, #FFA500 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .orders-header h2 {
            font-size: 24px;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.3);
            color: white;
            border: 2px solid white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 12px;
        }

        .filter-btn:hover, .filter-btn.active {
            background: white;
            color: #FF6B35;
        }

        .orders-content {
            padding: 25px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f5f5f5;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #666;
            border-bottom: 2px solid #e0e0e0;
            font-size: 13px;
            text-transform: uppercase;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 14px;
        }

        tbody tr:hover {
            background: #f9f9f9;
        }

        .order-id {
            font-weight: 600;
            color: #FF6B35;
        }

        .customer-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .customer-name {
            font-weight: 600;
            color: #333;
        }

        .customer-phone {
            color: #666;
            font-size: 12px;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: capitalize;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-preparing {
            background: #cce5ff;
            color: #004085;
        }

        .status-ready {
            background: #d4edda;
            color: #155724;
        }

        .status-completed {
            background: #d1ecf1;
            color: #0c5460;
        }

        .payment-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .payment-pending {
            background: #fff3cd;
            color: #856404;
        }

        .payment-completed {
            background: #d4edda;
            color: #155724;
        }

        .amount {
            font-weight: 600;
            color: #FF6B35;
            font-size: 16px;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-view {
            background: #cce5ff;
            color: #004085;
        }

        .btn-view:hover {
            background: #004085;
            color: white;
        }

        .btn-status {
            background: #fff3cd;
            color: #856404;
        }

        .btn-status:hover {
            background: #ffc107;
            color: white;
        }

        .btn-payment {
            background: #d4edda;
            color: #155724;
        }

        .btn-payment:hover {
            background: #28a745;
            color: white;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            padding: 25px;
            background: linear-gradient(135deg, #FF6B35 0%, #FFA500 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e0e0e0;
        }

        .modal-header h2 {
            font-size: 22px;
        }

        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .modal-body {
            padding: 25px;
        }

        .order-details {
            margin-bottom: 25px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .detail-label {
            color: #666;
            font-weight: 600;
        }

        .detail-value {
            color: #333;
            font-weight: 600;
        }

        .order-items {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .item-row:last-child {
            border-bottom: none;
        }

        .item-name {
            font-weight: 600;
            color: #333;
        }

        .item-qty {
            color: #666;
        }

        .item-price {
            color: #FF6B35;
            font-weight: 600;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .modal-actions select {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        .modal-actions button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .filter-buttons {
                justify-content: flex-start;
                width: 100%;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 10px 5px;
            }

            .action-buttons {
                flex-direction: column;
            }

            .modal-content {
                max-width: 90vw;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-container">
            <div class="logo">🍖 Greazy Staff Dashboard</div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container">
        <div class="dashboard-header">
            <h1>📊 Orders Management</h1>
            <p>Manage and track all customer orders in real-time</p>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Orders</div>
                <div class="stat-value" id="totalOrders">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Pending Orders</div>
                <div class="stat-value" id="pendingOrders">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Completed Today</div>
                <div class="stat-value" id="completedOrders">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Revenue Today</div>
                <div class="stat-value" id="todayRevenue">R0</div>
            </div>
        </div>

        <!-- Orders Table -->
        <div class="orders-section">
            <div class="orders-header">
                <h2>📋 All Orders</h2>
                <div class="filter-buttons">
                    <button class="filter-btn active" onclick="filterOrders('all')">All</button>
                    <button class="filter-btn" onclick="filterOrders('pending')">Pending</button>
                    <button class="filter-btn" onclick="filterOrders('preparing')">Preparing</button>
                    <button class="filter-btn" onclick="filterOrders('ready')">Ready</button>
                    <button class="filter-btn" onclick="filterOrders('completed')">Completed</button>
                </div>
            </div>

            <div class="orders-content">
                <div id="emptyState" class="empty-state" style="display: none;">
                    <div class="empty-state-icon">📭</div>
                    <p>No orders found</p>
                </div>
                <table id="ordersTable">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Type</th>
                            <th>Amount</th>
                            <th>Payment</th>
                            <th>Status</th>
                            <th>Time</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="ordersBody">
                        <!-- Populated by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Order Details Modal -->
    <div class="modal" id="orderModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalOrderId"></h2>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="order-details" id="orderDetails">
                    <!-- Populated by JavaScript -->
                </div>
                <div class="order-items" id="orderItems">
                    <!-- Populated by JavaScript -->
                </div>
                <div class="modal-actions">
                    <select id="statusSelect" onchange="updateOrderStatus()">
                        <option value="">Change Status...</option>
                        <option value="pending">Pending</option>
                        <option value="preparing">Preparing</option>
                        <option value="ready">Ready</option>
                        <option value="completed">Completed</option>
                    </select>
                    <select id="paymentSelect" onchange="updatePaymentStatus()">
                        <option value="">Update Payment...</option>
                        <option value="pending">Pending</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allOrders = [];
        let currentFilter = 'all';
        let selectedOrderId = null;

        // Initialize
        async function init() {
            await loadOrders();
            // Refresh every 5 seconds
            setInterval(loadOrders, 5000);
        }

        // Load all orders
        async function loadOrders() {
            try {
                const response = await fetch('/api/admin/orders');
                if (!response.ok) {
                    window.location.href = '/login';
                    return;
                }
                allOrders = await response.json();
                renderOrders();
                updateStats();
            } catch (error) {
                console.error('Error loading orders:', error);
            }
        }

        // Render orders table
        function renderOrders() {
            const tbody = document.getElementById('ordersBody');
            const emptyState = document.getElementById('emptyState');
            
            let filteredOrders = allOrders;
            if (currentFilter !== 'all') {
                filteredOrders = allOrders.filter(o => o.status === currentFilter);
            }

            if (filteredOrders.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            tbody.innerHTML = filteredOrders.map(order => `
                <tr>
                    <td class="order-id">${order.id}</td>
                    <td>
                        <div class="customer-info">
                            <span class="customer-name">${order.customerName}</span>
                            <span class="customer-phone">${order.customerPhone}</span>
                        </div>
                    </td>
                    <td>${order.orderType.charAt(0).toUpperCase() + order.orderType.slice(1)}</td>
                    <td class="amount">R${order.total}</td>
                    <td>
                        <span class="payment-badge ${order.paymentStatus === 'completed' ? 'payment-completed' : 'payment-pending'}">
                            ${order.paymentMethod} - ${order.paymentStatus}
                        </span>
                    </td>
                    <td>
                        <span class="status-badge status-${order.status}">
                            ${order.status}
                        </span>
                    </td>
                    <td>${formatTime(order.timestamp)}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="action-btn btn-view" onclick="viewOrder('${order.id}')">View</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // Update stats
        function updateStats() {
            const today = Math.floor(Date.now() / 1000) - (24 * 3600);
            
            document.getElementById('totalOrders').textContent = allOrders.length;
            document.getElementById('pendingOrders').textContent = allOrders.filter(o => o.status === 'pending').length;
            document.getElementById('completedOrders').textContent = allOrders.filter(o => o.status === 'completed' && o.timestamp > today).length;
            
            const todayRevenue = allOrders
                .filter(o => o.timestamp > today)
                .reduce((sum, o) => sum + o.total, 0);
            document.getElementById('todayRevenue').textContent = `R${todayRevenue}`;
        }

        // Filter orders
        function filterOrders(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderOrders();
        }

        // View order details
        function viewOrder(orderId) {
            const order = allOrders.find(o => o.id === orderId);
            if (!order) return;

            selectedOrderId = orderId;
            document.getElementById('modalOrderId').textContent = order.id;
            
            const detailsHtml = `
                <div class="detail-row">
                    <span class="detail-label">Customer</span>
                    <span class="detail-value">${order.customerName}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Phone</span>
                    <span class="detail-value">${order.customerPhone}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Order Type</span>
                    <span class="detail-value">${order.orderType.charAt(0).toUpperCase() + order.orderType.slice(1)}</span>
                </div>
                ${order.deliveryAddress ? `
                <div class="detail-row">
                    <span class="detail-label">Delivery Address</span>
                    <span class="detail-value">${order.deliveryAddress}</span>
                </div>
                ` : ''}
                <div class="detail-row">
                    <span class="detail-label">Payment Method</span>
                    <span class="detail-value">${order.paymentMethod}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Payment Status</span>
                    <span class="detail-value">
                        <span class="payment-badge ${order.paymentStatus === 'completed' ? 'payment-completed' : 'payment-pending'}">
                            ${order.paymentStatus}
                        </span>
                    </span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Order Status</span>
                    <span class="detail-value">
                        <span class="status-badge status-${order.status}">
                            ${order.status}
                        </span>
                    </span>
                </div>
                ${order.orderNotes ? `
                <div class="detail-row">
                    <span class="detail-label">Special Notes</span>
                    <span class="detail-value">${order.orderNotes}</span>
                </div>
                ` : ''}
                <div class="detail-row">
                    <span class="detail-label">Total Amount</span>
                    <span class="detail-value" style="color: #FF6B35; font-size: 18px;">R${order.total}</span>
                </div>
            `;
            document.getElementById('orderDetails').innerHTML = detailsHtml;

            const itemsHtml = order.items.map(item => `
                <div class="item-row">
                    <span class="item-name">${item.name}</span>
                    <span class="item-qty">x${item.quantity}</span>
                    <span class="item-price">R${item.price * item.quantity}</span>
                </div>
            `).join('');
            document.getElementById('orderItems').innerHTML = itemsHtml;

            document.getElementById('statusSelect').value = order.status;
            document.getElementById('paymentSelect').value = order.paymentStatus;
            document.getElementById('orderModal').classList.add('active');
        }

        // Update order status
        async function updateOrderStatus() {
            const status = document.getElementById('statusSelect').value;
            if (!status || !selectedOrderId) return;

            try {
                const response = await fetch(`/api/orders/${selectedOrderId}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });

                if (response.ok) {
                    await loadOrders();
                    alert('Order status updated!');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error updating status');
            }
        }

        // Update payment status
        async function updatePaymentStatus() {
            const paymentStatus = document.getElementById('paymentSelect').value;
            if (!paymentStatus || !selectedOrderId) return;

            try {
                const response = await fetch(`/api/orders/${selectedOrderId}/payment`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ paymentStatus })
                });

                if (response.ok) {
                    await loadOrders();
                    alert('Payment status updated!');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error updating payment');
            }
        }

        // Close modal
        function closeModal() {
            document.getElementById('orderModal').classList.remove('active');
        }

        // Format time
        function formatTime(timestamp) {
            const date = new Date(timestamp * 1000);
            return date.toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' });
        }

        // Logout
        function logout() {
            window.location.href = '/logout';
        }

        // Initialize app
        init();
    </script>
</body>
</html>
